# ============================================================================
# Configuración Nginx - Alumno C (Módulo Profesores - UFV)
# ============================================================================
# Load Balancer / Reverse Proxy para el módulo de profesores
# Versión: 1.0 (Alumno C)
#
# Estructura:
# - Location /profesores -> Backend Node.js (profesores.js)
# - Balanceo entre: 10.1.1.10:3001 y 10.1.1.11:3001
# - Archivos estáticos en /var/www/public

events {
    worker_connections 1024;
}

http {
    # ====================================================================
    # UPSTREAMS - Definición de servidores backend
    # ====================================================================
    
    upstream profesores_app {
        # Balanceo round-robin con health checks
        server 10.1.1.10:3001 max_fails=3 fail_timeout=30s;
        server 10.1.1.11:3001 max_fails=3 fail_timeout=30s;
        
        # Keepalive connections
        keepalive 32;
    }
    
    # ====================================================================
    # SERVIDOR PRINCIPAL
    # ====================================================================
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        server_name _;
        
        # Logs
        access_log /var/log/nginx/access.log combined;
        error_log /var/log/nginx/error.log warn;
        
        # Gzip compression
        gzip on;
        gzip_types text/plain text/css text/xml text/javascript application/json;
        gzip_min_length 1000;
        
        # ================================================================
        # LOCATION: /profesores - Módulo de Gestión de Asignaturas
        # ================================================================
        
        location /profesores/ {
            proxy_pass http://profesores_app/api/profesores/;
            
            # Headers proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Retry logic
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
        
        # ================================================================
        # LOCATION: /api/profesores - API REST del módulo
        # ================================================================
        
        location /api/profesores/ {
            proxy_pass http://profesores_app/api/profesores/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Métodos permitidos: GET, POST, PUT, DELETE
            limit_except GET POST PUT DELETE {
                deny all;
            }
        }
        
        # ================================================================
        # LOCATION: /static - Archivos estáticos
        # ================================================================
        
        location /static/ {
            alias /var/www/public/;
            
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }
        
        # ================================================================
        # LOCATION: /health - Health check
        # ================================================================
        
        location /health {
            proxy_pass http://profesores_app/api/profesores/health;
            proxy_set_header Host $host;
            access_log off;
        }
        
        # ================================================================
        # LOCATION: / - Raíz
        # ================================================================
        
        location = / {
            return 301 /profesores/;
        }
        
        # ================================================================
        # DENEGAR ACCESO A ARCHIVOS SENSIBLES
        # ================================================================
        
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
